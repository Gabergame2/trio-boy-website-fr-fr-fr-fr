kind = "web"
previewPath = "/"
title = "Trio Boys"
version = "1.0.0"
id = "artifacts/trio-boys"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19545

[services.development]
run = "pnpm --filter @workspace/trio-boys run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trio-boys", "run", "build" ]
serve = "static"
publicDir = "artifacts/trio-boys/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19545"
BASE_PATH = "/"
